<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F5F1;
    --card:#FFFFFF;
    --ink:#20241F;
    --ink-soft:#6B6F68;
    --line:#E4E2DB;
    --accent:#1F6B65;
    --accent-soft:#DCEBE9;
    --not-started:#8B93A1;
    --not-started-bg:#EEF0F3;
    --in-progress:#2E6E8E;
    --in-progress-bg:#E4EEF3;
    --blocked:#B1502E;
    --blocked-bg:#F6E7E1;
    --done:#3F8F5F;
    --done-bg:#E5F2E9;
    --critical:#B3261E;
    --critical-bg:#FBE4E2;
    --high:#C1622E;
    --high-bg:#F8E5D9;
    --medium:#B8860B;
    --medium-bg:#FBF1D8;
    --low:#3D6B8C;
    --low-bg:#E3EEF4;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:96px;
  }
  h1,h2,h3,.display{ font-family:'Space Grotesk',system-ui,sans-serif; }

  header{
    padding:28px 20px 18px;
    position:sticky; top:0; z-index:5;
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  header h1{
    margin:0 0 2px;
    font-size:22px;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  header p{ margin:0; color:var(--ink-soft); font-size:13px; }

  .distribution{
    margin-top:16px;
    height:6px;
    border-radius:99px;
    overflow:hidden;
    display:flex;
    background:var(--line);
  }
  .distribution span{ height:100%; }

  .legend{
    display:flex; gap:14px; margin-top:8px; flex-wrap:wrap;
  }
  .legend div{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--ink-soft); }
  .legend i{ width:7px; height:7px; border-radius:50%; display:inline-block; }

  .filters{
    display:flex; gap:8px; padding:14px 20px 4px;
    overflow-x:auto;
  }
  .filters button{
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink-soft);
    font-family:inherit;
    font-size:12.5px;
    font-weight:500;
    padding:7px 13px;
    border-radius:99px;
    white-space:nowrap;
    cursor:pointer;
  }
  .filters button.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }

  main{ padding:12px 20px 20px; }

  .empty{
    text-align:center;
    color:var(--ink-soft);
    padding:60px 20px;
    font-size:14px;
  }

  .task{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 16px 14px;
    margin-bottom:12px;
  }
  .task-top{
    display:flex; justify-content:space-between; align-items:flex-start; gap:10px;
    cursor:pointer;
  }
  .task-title{ font-size:15.5px; font-weight:600; margin:0 0 4px; line-height:1.3; }
  .task-meta{ font-size:12.5px; color:var(--ink-soft); }

  .pill{
    font-size:11px; font-weight:600; padding:4px 10px; border-radius:99px;
    white-space:nowrap; flex-shrink:0;
  }
  .pill.not-started{ color:var(--not-started); background:var(--not-started-bg); }
  .pill.in-progress{ color:var(--in-progress); background:var(--in-progress-bg); }
  .pill.blocked{ color:var(--blocked); background:var(--blocked-bg); }
  .pill.done{ color:var(--done); background:var(--done-bg); }
  .pill.critical{ color:var(--critical); background:var(--critical-bg); }
  .pill.high{ color:var(--high); background:var(--high-bg); }
  .pill.medium{ color:var(--medium); background:var(--medium-bg); }
  .pill.low{ color:var(--low); background:var(--low-bg); }

  .type-tag{
    font-size:10.5px; font-weight:700; letter-spacing:0.03em; text-transform:uppercase;
    color:var(--ink-soft); display:inline-flex; align-items:center; gap:4px; margin-bottom:4px;
  }
  .type-tag.issue{ color:var(--critical); }

  .task{ border-left-width:4px; border-left-style:solid; }
  .task.sev-critical{ border-left-color:var(--critical); }
  .task.sev-high{ border-left-color:var(--high); }
  .task.sev-medium{ border-left-color:var(--medium); }
  .task.sev-low{ border-left-color:var(--low); }

  .tag-row{ display:flex; gap:6px; align-items:center; margin-bottom:2px; }

  .latest{
    margin-top:10px;
    font-size:13px;
    color:var(--ink);
    background:var(--bg);
    border-radius:9px;
    padding:9px 11px;
  }
  .latest b{ font-weight:600; color:var(--ink-soft); font-size:11px; display:block; margin-bottom:2px; }

  .task-body{ display:none; margin-top:14px; border-top:1px solid var(--line); padding-top:14px; }
  .task.open .task-body{ display:block; }

  .status-row{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
  .status-row button{
    font-family:inherit; font-size:11.5px; font-weight:600;
    border:1px solid var(--line); background:var(--card);
    padding:6px 10px; border-radius:8px; cursor:pointer; color:var(--ink-soft);
  }
  .status-row button.current{ border-color:var(--ink); color:var(--ink); }

  .updates-list{ list-style:none; margin:0 0 12px; padding:0; }
  .updates-list li{
    font-size:13px; padding:8px 0; border-bottom:1px dashed var(--line);
  }
  .updates-list li:last-child{ border-bottom:none; }
  .updates-list .date{ font-weight:600; color:var(--ink-soft); font-size:11.5px; display:block; margin-bottom:2px; }

  .add-update{ display:flex; gap:8px; }
  .add-update input{
    flex:1; border:1px solid var(--line); border-radius:9px; padding:9px 11px;
    font-family:inherit; font-size:13px; background:var(--bg);
  }
  .add-update button{
    border:none; background:var(--accent); color:#fff; font-weight:600;
    font-size:13px; padding:0 16px; border-radius:9px; cursor:pointer;
  }

  .fab{
    position:fixed; right:20px; bottom:24px;
    width:56px; height:56px; border-radius:50%;
    background:var(--accent); color:#fff; border:none;
    font-size:26px; line-height:56px; text-align:center;
    box-shadow:0 8px 20px rgba(31,107,101,0.35);
    cursor:pointer;
  }

  .sheet-overlay{
    display:none; position:fixed; inset:0; background:rgba(20,22,19,0.45); z-index:10;
    align-items:flex-end; justify-content:center;
  }
  .sheet-overlay.show{ display:flex; }
  .sheet{
    background:var(--card); width:100%; max-width:480px;
    border-radius:18px 18px 0 0; padding:22px 20px 26px;
  }
  .sheet h2{ margin:0 0 16px; font-size:17px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:5px; }
  .field input, .field select{
    width:100%; border:1px solid var(--line); border-radius:9px; padding:10px 11px;
    font-family:inherit; font-size:14px; background:var(--bg); color:var(--ink);
  }
  .sheet-actions{ display:flex; gap:10px; margin-top:6px; }
  .sheet-actions button{
    flex:1; border:none; border-radius:10px; padding:12px; font-family:inherit;
    font-size:14px; font-weight:600; cursor:pointer;
  }
  .sheet-actions .cancel{ background:var(--bg); color:var(--ink-soft); }
  .sheet-actions .save{ background:var(--accent); color:#fff; }

  .toast{
    position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(20px);
    background:var(--ink); color:#fff; font-size:13px; padding:10px 16px; border-radius:99px;
    opacity:0; transition:all .25s ease; pointer-events:none; z-index:20;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>

<div class="toast" id="toast"></div>

<script>
  // ---- Paste your Apps Script Web App URL below ----
  const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwUy8B_qaFfC9vN7UfyzTEGSW1AwKjHxKkaJDfi_FYlvj6Bjc43vLclY_jFm15LAx_ihA/exec';

  const STATUS_CLASS = {
    'Not Started':'not-started','In Progress':'in-progress','Blocked':'blocked','Done':'done'
  };
  const STATUS_COLOR = {
    'Not Started':'var(--not-started)','In Progress':'var(--in-progress)','Blocked':'var(--blocked)','Done':'var(--done)'
  };
  const SEV_CLASS = { 'Critical':'critical','High':'high','Medium':'medium','Low':'low' };

  let tasks = [];
  let teacherNames = [];
  let activeFilter = 'All';

  // ---- Authentication ----
  // Password is hashed in the browser before it's ever sent or stored —
  // the sheet only ever holds a hash, never the actual password. This is
  // basic protection for an internal tool, not enterprise-grade security.
  let failedAttempts = 0;
  let isNewPasswordFlow = false;

  function getMe(){
    const auth = JSON.parse(localStorage.getItem('teamTasksAuth') || 'null');
    return auth ? auth.name : '';
  }
  function setAuth(name){
    localStorage.setItem('teamTasksAuth', JSON.stringify({name}));
    document.getElementById('whoAmIBadge').textContent = name;
  }
  function signOut(){
    localStorage.removeItem('teamTasksAuth');
    location.reload();
  }
  async function sha256(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function ensureIdentity(){
    const name = getMe();
    if(name){
      document.getElementById('whoAmIBadge').textContent = name;
    } else {
      document.getElementById('loginOverlay').classList.add('show');
    }
  }
  document.getElementById('whoAmIBadge').addEventListener('click', ()=>{
    if(confirm('Sign out of Team Tasks?')) signOut();
  });

  function showLoginError(msg){
    const el = document.getElementById('loginError');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideLoginError(){
    document.getElementById('loginError').style.display = 'none';
  }
  function showContactAdmin(){
    showLoginError('Too many attempts, or a forgotten password — please contact your Administrator to reset it.');
    document.getElementById('loginSubmit').disabled = true;
    document.getElementById('loginSubmit').style.opacity = '0.5';
  }

  document.getElementById('loginName').addEventListener('change', async (e)=>{
    hideLoginError();
    failedAttempts = 0;
    const name = e.target.value;
    const pwField = document.getElementById('loginPasswordField');
    const submitBtn = document.getElementById('loginSubmit');
    const pwInput = document.getElementById('loginPassword');
    pwInput.value = '';
    if(!name){
      pwField.style.display = 'none';
      submitBtn.style.display = 'none';
      return;
    }
    try{
      const result = await api('checkTeacherStatus', {name});
      if(!result.ok){ showLoginError(result.error || 'Could not check this name.'); return; }
      isNewPasswordFlow = !result.hasPassword;
      document.getElementById('loginPasswordLabel').textContent = isNewPasswordFlow ? 'Choose a password' : 'Password';
      pwInput.placeholder = isNewPasswordFlow ? 'This is your first sign-in — choose a password' : 'Enter your password';
      document.getElementById('loginHint').textContent = isNewPasswordFlow
        ? "Looks like it's your first time — choose a password to use from now on."
        : 'Enter your password to continue.';
      submitBtn.textContent = isNewPasswordFlow ? 'Set password & continue' : 'Sign in';
      pwField.style.display = 'block';
      submitBtn.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }catch(err){
      showLoginError('Could not reach the server — check WEB_APP_URL.');
    }
  });

  document.getElementById('forgotPassword').addEventListener('click', (e)=>{
    e.preventDefault();
    showContactAdmin();
  });

  document.getElementById('loginSubmit').addEventListener('click', async ()=>{
    hideLoginError();
    const name = document.getElementById('loginName').value;
    const password = document.getElementById('loginPassword').value;
    if(!name || !password){ showLoginError('Select your name and enter a password.'); return; }
    try{
      const passwordHash = await sha256(password);
      const result = await api('authenticate', {name, passwordHash});
      if(result.ok){
        setAuth(result.name);
        document.getElementById('loginOverlay').classList.remove('show');
        toast(result.isNewSignup ? `Password set! Welcome, ${result.name}` : `Welcome back, ${result.name}`);
        loadTeachers();
        load();
      } else {
        failedAttempts++;
        if(failedAttempts >= 3){
          showContactAdmin();
        } else {
          showLoginError(result.error || 'Sign-in failed.');
        }
      }
    }catch(err){
      showLoginError('Could not reach the server — check WEB_APP_URL.');
      console.error('authenticate failed:', err);
    }
  });

  async function loadTeachers(){
    try{
      const data = await api('listTeachers');
      teacherNames = (data.teachers || []).filter(n => n && n.toLowerCase() !== 'add one teacher per row');
    }catch(err){
      teacherNames = [];
    }
    const optionsHtml = teacherNames.map(n => `<option value="${escapeHtml(n)}">${escapeHtml(n)}</option>`).join('');
    ['newAssigner','newAssignee','loginName'].forEach(id=>{
      const el = document.getElementById(id);
      const placeholder = el.options[0];
      el.innerHTML = '';
      el.appendChild(placeholder);
      el.insertAdjacentHTML('beforeend', optionsHtml);
    });
  }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 1800);
  }

  // JSONP request — loads data via a <script> tag instead of fetch(),
  // which sidesteps CORS restrictions entirely (Apps Script web apps
  // don't reliably send CORS headers for direct fetch() calls).
  function jsonp(url){
    return new Promise((resolve, reject)=>{
      const cbName = 'jsonp_cb_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const cleanup = () => { delete window[cbName]; script.remove(); };
      window[cbName] = (data) => { resolve(data); cleanup(); };
      script.onerror = () => { reject(new Error('Request failed')); cleanup(); };
      script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
      document.body.appendChild(script);
    });
  }

  async function api(action, payload={}){
    const params = new URLSearchParams({ action, ...payload });
    return jsonp(WEB_APP_URL + '?' + params.toString());
  }

  function fmtDate(iso){
    const d = new Date(iso);
    return d.toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'});
  }
  function fmtDateTime(iso){
    const d = new Date(iso);
    return d.toLocaleDateString(undefined,{month:'short', day:'numeric', year:'numeric'}) +
      ' · ' + d.toLocaleTimeString(undefined,{hour:'numeric', minute:'2-digit'});
  }

  function render(){
    const list = document.getElementById('taskList');
    let filtered;
    if(activeFilter === 'All') filtered = tasks;
    else if(activeFilter === 'Mine') filtered = tasks.filter(t => t.assignee === getMe());
    else filtered = tasks.filter(t => t.status === activeFilter);

    if(!filtered.length){
      list.innerHTML = '<div class="empty">No tasks here yet. Tap + to add one.</div>';
    } else {
      list.innerHTML = filtered.map(taskCard).join('');
    }

    // distribution bar
    const dist = document.getElementById('distribution');
    const total = tasks.length || 1;
    const order = ['Not Started','In Progress','Blocked','Done'];
    dist.innerHTML = order.map(s=>{
      const count = tasks.filter(t=>t.status===s).length;
      const pct = (count/total*100).toFixed(2);
      return count ? `<span style="width:${pct}%;background:${STATUS_COLOR[s]}"></span>` : '';
    }).join('');

    document.getElementById('subtitle').textContent =
      tasks.length ? `${tasks.length} task${tasks.length!==1?'s':''} tracked` : 'No tasks yet';

    document.querySelectorAll('.task').forEach(el=>{
      el.querySelector('.task-top').addEventListener('click', ()=>el.classList.toggle('open'));
    });
    document.querySelectorAll('.status-row button').forEach(btn=>{
      btn.addEventListener('click', async (e)=>{
        e.stopPropagation();
        const id = btn.closest('.task').dataset.id;
        const status = btn.dataset.status;
        try{
          await api('updateStatus', {taskId:id, status, author:getMe()});
          toast('Status updated');
          load();
        }catch(err){
          toast('Failed to reach server — check WEB_APP_URL');
          console.error('updateStatus failed:', err);
        }
      });
    });
    document.querySelectorAll('.add-update').forEach(row=>{
      row.querySelector('button').addEventListener('click', async (e)=>{
        e.stopPropagation();
        const id = row.closest('.task').dataset.id;
        const input = row.querySelector('input');
        if(!input.value.trim()) return;
        try{
          await api('addUpdate', {taskId:id, comment:input.value.trim(), author:getMe()});
          input.value='';
          toast('Update added');
          load();
        }catch(err){
          toast('Failed to reach server — check WEB_APP_URL');
          console.error('addUpdate failed:', err);
        }
      });
    });
  }

  function taskCard(t){
    const cls = STATUS_CLASS[t.status] || 'not-started';
    const sevCls = SEV_CLASS[t.severity] || 'medium';
    const isIssue = t.type === 'Issue';
    const latest = t.updates[0];
    return `
    <div class="task sev-${sevCls}" data-id="${t.id}">
      <div class="task-top">
        <div>
          <div class="tag-row">
            <span class="type-tag ${isIssue ? 'issue' : ''}">${isIssue ? '⚠ Issue' : '✓ Task'}</span>
            <span class="pill ${sevCls}">${escapeHtml(t.severity || 'Medium')}</span>
          </div>
          <p class="task-title">${escapeHtml(t.title)}</p>
          <p class="task-meta">Assigned by ${escapeHtml(t.assigner || '—')} → ${escapeHtml(t.assignee || 'unassigned')}</p>
        </div>
        <span class="pill ${cls}">${t.status}</span>
      </div>
      ${latest ? `<div class="latest"><b>${fmtDateTime(latest.date)}${latest.author ? ' · ' + escapeHtml(latest.author) : ''}</b>${escapeHtml(latest.comment)}</div>` : ''}
      <div class="task-body">
        <div class="status-row">
          ${['Not Started','In Progress','Blocked','Done'].map(s=>
            `<button data-status="${s}" class="${s===t.status?'current':''}">${s}</button>`
          ).join('')}
        </div>
        <ul class="updates-list">
          ${t.updates.length ? t.updates.map(u=>`<li><span class="date">${fmtDateTime(u.date)}${u.author ? ' · ' + escapeHtml(u.author) : ''}</span>${escapeHtml(u.comment)}</li>`).join('') : '<li style="color:var(--ink-soft)">No updates yet.</li>'}
        </ul>
        <div class="add-update">
          <input placeholder="Add an update…">
          <button>Post</button>
        </div>
      </div>
    </div>`;
  }

  function escapeHtml(str){
    return String(str ?? '').replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[m]));
  }

  async function load(){
    try{
      const data = await api('list');
      tasks = data.tasks || [];
      render();
    }catch(err){
      document.getElementById('subtitle').textContent = 'Could not load tasks — check WEB_APP_URL';
    }
  }

  // filters
  document.getElementById('filters').addEventListener('click', (e)=>{
    if(e.target.tagName !== 'BUTTON') return;
    document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    activeFilter = e.target.dataset.status;
    render();
  });

  // new task sheet
  const overlay = document.getElementById('newTaskOverlay');
  document.getElementById('openNewTask').addEventListener('click', ()=>overlay.classList.add('show'));
  document.getElementById('cancelNewTask').addEventListener('click', ()=>overlay.classList.remove('show'));
  document.getElementById('saveNewTask').addEventListener('click', async ()=>{
    const title = document.getElementById('newTitle').value.trim();
    const assigner = document.getElementById('newAssigner').value;
    const assignee = document.getElementById('newAssignee').value;
    const type = document.getElementById('newType').value;
    const severity = document.getElementById('newSeverity').value;
    const status = document.getElementById('newStatus').value;
    if(!title){ toast('Task title is required'); return; }
    try{
      const result = await api('addTask', {title, assigner, assignee, type, severity, status});
      if(result && result.error){ toast('Error: ' + result.error); return; }
      document.getElementById('newTitle').value = '';
      document.getElementById('newAssigner').value = '';
      document.getElementById('newAssignee').value = '';
      overlay.classList.remove('show');
      toast('Task added');
      load();
    }catch(err){
      toast('Failed to reach server — check WEB_APP_URL');
      console.error('addTask failed:', err);
    }
  });

  (async function init(){
    await loadTeachers();
    ensureIdentity();
    if(getMe()) load();
  })();
</script>
</body>
</html>
